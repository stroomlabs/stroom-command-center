<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!--
    Stroom Command app icon source. 1024×1024 dark canvas with a centered
    teal "S" wordmark in Archivo Black and a radial teal halo behind it.
    Regenerate PNGs from this file via:
      npx svg-to-png apps/native/assets/icon.svg apps/native/assets/icon.png 1024
      npx svg-to-png apps/native/assets/icon.svg apps/native/assets/adaptive-icon.png 1024
    Or drop this SVG into any rasterizer and export at 1024×1024.
  -->

  <defs>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00A19B" stop-opacity="0.55" />
      <stop offset="45%"  stop-color="#00A19B" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#00A19B" stop-opacity="0.00" />
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Obsidian background -->
  <rect width="1024" height="1024" fill="#0E0F14" />

  <!-- Soft teal radial halo centered on the mark -->
  <circle cx="512" cy="512" r="480" fill="url(#halo)" />

  <!-- Monogram "S" — Archivo Black teal, centered -->
  <text
    x="512"
    y="650"
    font-family="Archivo, 'Archivo Black', system-ui, sans-serif"
    font-weight="900"
    font-size="720"
    text-anchor="middle"
    fill="#00A19B"
    letter-spacing="-20"
    filter="url(#glow)"
  >S</text>
</svg>
